<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/contacto.css" />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v6.4.2/css/all.css"
    />
    <link rel="icon" type="image/png" href="assets/img/corazon.png" />
    <title>Trabaja con Nosotros - Gelateria Di Amore</title>
    <script defer src="https://cdn.vercel-analytics.com/v1/web.js"></script>
  </head>
  <body>
    <div id="header"></div>

    <main class="main-content">
      <div class="container-contacto">
        <div>
          <h1>¡Únete a Nuestro Equipo!</h1>
          <p>
            ¿Te apasiona el mundo de los helados artesanales? Estamos buscando
            personas comprometidas y entusiastas para formar parte de nuestra
            familia. ¡Envíanos tu candidatura!
          </p>
        </div>
        <div class="divisor">
          <span class="icono-divisor">
            <img src="assets/img/corazon.png" alt="corazón" />
          </span>
        </div>
        <div class="contacto-div">
          <div class="columna-formulario">
            <div class="card-formulario">
              <h2><i class="fas fa-user-plus"></i> Envíanos tu Candidatura</h2>
              <p class="subtitulo">
                Completa el formulario y nos pondremos en contacto contigo
              </p>
              <form
                action="#"
                method="post"
                class="form-contacto"
                enctype="multipart/form-data"
              >
                <div class="form-group">
                  <label for="nombre"
                    ><i class="fas fa-user"></i> Nombre completo</label
                  >
                  <input
                    type="text"
                    id="nombre"
                    name="nombre"
                    placeholder="Tu nombre completo"
                    required
                  />
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="email"
                      ><i class="fas fa-envelope"></i> Email</label
                    >
                    <input
                      type="email"
                      id="email"
                      name="email"
                      placeholder="tu@email.com"
                      required
                    />
                  </div>
                  <div class="form-group">
                    <label for="telefono"
                      ><i class="fas fa-phone"></i> Teléfono</label
                    >
                    <input
                      type="tel"
                      id="telefono"
                      name="telefono"
                      placeholder="+34 000 000 000"
                      required
                    />
                  </div>
                </div>
                <div class="form-group">
                  <label for="puesto"
                    ><i class="fas fa-briefcase"></i> Puesto de interés</label
                  >
                  <select id="puesto" name="puesto" required>
                    <option value="">Selecciona un puesto</option>
                    <option value="heladero">Heladero/a Artesanal</option>
                    <option value="dependiente">Dependiente/a</option>
                    <option value="encargado">Encargado/a de Tienda</option>
                    <option value="practicas">Prácticas</option>
                    <option value="otro">Otro</option>
                  </select>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="edad"
                      ><i class="fas fa-calendar-alt"></i> Edad</label
                    >
                    <input
                      type="number"
                      id="edad"
                      name="edad"
                      placeholder="Tu edad"
                      min="16"
                      max="99"
                      required
                    />
                  </div>
                  <div class="form-group">
                    <label for="disponibilidad"
                      ><i class="fas fa-clock"></i> Disponibilidad</label
                    >
                    <select id="disponibilidad" name="disponibilidad" required>
                      <option value="">Selecciona</option>
                      <option value="completa">Jornada completa</option>
                      <option value="parcial">Jornada parcial</option>
                      <option value="fines">Fines de semana</option>
                      <option value="verano">Solo verano</option>
                    </select>
                  </div>
                </div>
                <div class="form-group">
                  <label for="experiencia"
                    ><i class="fas fa-star"></i> Experiencia previa</label
                  >
                  <textarea
                    id="experiencia"
                    name="experiencia"
                    rows="4"
                    placeholder="Cuéntanos tu experiencia laboral relacionada..."
                    required
                  ></textarea>
                </div>
                <div class="form-group">
                  <label for="cv"
                    ><i class="fas fa-file-upload"></i> Adjuntar CV (PDF)</label
                  >
                  <input type="file" id="cv" name="cv" />
                </div>
                <div class="form-group">
                  <label for="motivacion"
                    ><i class="fas fa-heart"></i> ¿Por qué quieres trabajar con
                    nosotros?</label
                  >
                  <textarea
                    id="motivacion"
                    name="motivacion"
                    rows="4"
                    placeholder="Cuéntanos qué te motiva a unirte a nuestro equipo..."
                    required
                  ></textarea>
                </div>
                <div class="form-buttons">
                  <button type="submit" class="btn-enviar">
                    <i class="fas fa-paper-plane"></i> Enviar Candidatura
                  </button>
                  <button type="reset" class="btn-limpiar">
                    <i class="fas fa-eraser"></i> Limpiar
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="footer"></div>
    <script src="js/componentes.js"></script>
    <script defer src="https://cdn.vercel-analytics.com/v1/web.js"></script>
  </body>
</html>
